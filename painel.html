<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Painel do Profissional — EisenCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="painel.css" />
</head>
<body class="panel-body">

  <!-- ===== HEADER ===== -->
  <header class="panel-header">
    <div class="panel-header-brand">
      <span class="panel-logo">✂</span>
      <div class="panel-brand-text">
        <span class="panel-name">Bryan Rory</span>
        <span class="panel-role">Painel do profissional</span>
      </div>
    </div>
    <div class="panel-header-actions">
      <button class="btn btn-primary btn-sm" id="btn-novo-global">
        + Novo agendamento
      </button>
      <a href="index.html" class="btn btn-outline btn-sm">Sair</a>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="panel-main">

    <!-- Agenda toolbar -->
    <div class="agenda-toolbar">
      <div class="agenda-nav-controls">
        <button class="btn btn-outline btn-sm icon-btn" id="btn-prev" aria-label="Dia anterior">&#8249;</button>
        <button class="btn btn-outline btn-sm" id="btn-hoje">Hoje</button>
        <button class="btn btn-outline btn-sm icon-btn" id="btn-next" aria-label="Próximo dia">&#8250;</button>
      </div>
      <h2 class="agenda-date-label" id="agenda-date-label"></h2>
      <div class="agenda-legend">
        <span class="legend-item"><span class="legend-dot confirmado"></span>Confirmado</span>
        <span class="legend-item"><span class="legend-dot pendente"></span>Pendente</span>
        <span class="legend-item"><span class="legend-dot concluido"></span>Concluído</span>
        <span class="legend-item"><span class="legend-dot bloqueio"></span>Bloqueado</span>
      </div>
    </div>

    <!-- Agenda grid -->
    <div class="agenda-wrapper" id="agenda-wrapper">
      <div class="agenda-grid">
        <div class="agenda-times" id="agenda-times"></div>
        <div class="agenda-events" id="agenda-events"></div>
      </div>
    </div>

  </main>

  <!-- ===== FAB (mobile only) ===== -->
  <button class="fab" id="fab-novo" aria-label="Novo agendamento">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ===== MODAL: Opções de slot ===== -->
  <div class="modal-overlay" id="modal-slot-options" role="dialog" aria-modal="true" aria-labelledby="slot-title">
    <div class="modal">
      <button class="modal-x" data-close="modal-slot-options" aria-label="Fechar">✕</button>
      <h2 class="modal-title" id="slot-title">O que deseja fazer?</h2>
      <p class="modal-hint" id="slot-hint"></p>
      <div class="modal-col-actions">
        <button class="btn btn-primary full-w" id="btn-choice-agendar">📅 Criar agendamento</button>
        <button class="btn btn-secondary full-w" id="btn-choice-bloquear">🔒 Bloquear horário</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Novo / Editar agendamento ===== -->
  <div class="modal-overlay" id="modal-agendamento" role="dialog" aria-modal="true" aria-labelledby="agenda-form-title">
    <div class="modal modal-lg">
      <button class="modal-x" data-close="modal-agendamento" aria-label="Fechar">✕</button>
      <h2 class="modal-title" id="agenda-form-title">Novo agendamento</h2>
      <form id="form-agendamento" autocomplete="off" novalidate>
        <input type="hidden" id="f-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="f-horario">Horário *</label>
            <input type="time" id="f-horario" required />
          </div>
          <div class="form-group">
            <label for="f-duracao">Duração</label>
            <select id="f-duracao">
              <option value="30">30 min</option>
              <option value="45">45 min</option>
              <option value="60" selected>60 min</option>
              <option value="90">90 min</option>
              <option value="120">2 horas</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="f-cliente">Cliente *</label>
          <input type="text" id="f-cliente" placeholder="Nome do cliente" required />
        </div>
        <div class="form-group">
          <label for="f-telefone">Telefone</label>
          <input type="tel" id="f-telefone" placeholder="(00) 00000-0000" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-servico">Serviço *</label>
            <input type="text" id="f-servico" placeholder="Ex: Corte de cabelo" required />
          </div>
          <div class="form-group">
            <label for="f-valor">Valor (R$)</label>
            <input type="text" id="f-valor" placeholder="0,00" />
          </div>
        </div>
        <div class="form-group form-check">
          <label>
            <input type="checkbox" id="f-encaixe" />
            ⚡ Marcar como encaixe
          </label>
        </div>
        <div class="form-group">
          <label for="f-obs">Observações</label>
          <textarea id="f-obs" rows="2" placeholder="Alguma observação?"></textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Salvar agendamento</button>
          <button type="button" class="btn btn-outline" data-close="modal-agendamento">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: Detalhes do agendamento ===== -->
  <div class="modal-overlay" id="modal-detalhes" role="dialog" aria-modal="true" aria-labelledby="detalhes-title">
    <div class="modal">
      <button class="modal-x" data-close="modal-detalhes" aria-label="Fechar">✕</button>
      <h2 class="modal-title" id="detalhes-title">Detalhes do atendimento</h2>
      <div class="detalhes-grid" id="detalhes-grid"></div>
      <div class="encaixe-badge" id="encaixe-badge" style="display:none">⚡ Encaixe</div>
      <div class="modal-col-actions">
        <button class="btn btn-secondary full-w" id="btn-editar">✏️ Editar agendamento</button>
        <button class="btn btn-success full-w" id="btn-concluir">✔ Concluir atendimento</button>
        <button class="btn btn-primary full-w" id="btn-confirmar">Confirmar</button>
        <button class="btn btn-danger full-w" id="btn-cancelar">Cancelar agendamento</button>
        <button class="btn btn-outline full-w" data-close="modal-detalhes">Fechar</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Bloquear horário ===== -->
  <div class="modal-overlay" id="modal-bloqueio" role="dialog" aria-modal="true" aria-labelledby="bloqueio-title">
    <div class="modal">
      <button class="modal-x" data-close="modal-bloqueio" aria-label="Fechar">✕</button>
      <h2 class="modal-title" id="bloqueio-title">Bloquear horário</h2>
      <form id="form-bloqueio" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="b-inicio">Horário inicial</label>
            <input type="time" id="b-inicio" required />
          </div>
          <div class="form-group">
            <label for="b-fim">Horário final</label>
            <input type="time" id="b-fim" required />
          </div>
        </div>
        <div class="form-group">
          <label for="b-motivo">Motivo (opcional)</label>
          <input type="text" id="b-motivo" placeholder="Ex: Almoço, pausa, compromisso..." />
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Bloquear</button>
          <button type="button" class="btn btn-outline" data-close="modal-bloqueio">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="painel.js"></script>
</body>
</html>
